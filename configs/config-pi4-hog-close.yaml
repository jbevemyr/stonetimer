# RockTimer - Pi 4 (Central Server + Hog Close sensor)

device_id: "hog_close"

gpio:
  sensor_pin: 17      # Timing sensor (laser)
  arm_pin: 27         # Arm sensor (IR) - hold hand in front to arm
  debounce_ms: 50

server:
  host: "0.0.0.0"
  http_port: 8080
  udp_port: 5000
  enable_speech: true
  # Prefer named device (more stable than hw:N,N across reboots)
  alsa_device: "default:CARD=Headphones"
  auto_arm_on_start: true
  speech:
    speak_ready: true
    speak_tee_hog: true
    speak_hog_hog: true
