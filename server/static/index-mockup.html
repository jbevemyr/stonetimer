<!DOCTYPE html>
<html lang="sv" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="google" content="notranslate">
    <title>RockTimer (Mockup)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #000000;
            color: #f2f2f2;
            padding: 10px;
            display: flex;
            flex-direction: column;
        }

        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
            min-height: 0;
        }

        /* Header */
        header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
            flex-shrink: 0;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 700;
            font-size: 1.1rem;
            letter-spacing: 0.2px;
        }

        .logo-icon {
            width: 24px;
            height: 24px;
            position: relative;
        }

        .logo-icon::before,
        .logo-icon::after {
            content: '';
            position: absolute;
            left: 0;
            width: 100%;
            height: 12px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.4);
        }

        .logo-icon::before {
            top: 0;
            border-radius: 0 0 999px 999px;
            background: #ff5fa2;
        }

        .logo-icon::after {
            bottom: 0;
            border-radius: 999px 999px 0 0;
            background: #ffb347;
        }

        .logo-text { font-weight: 700; }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #4b4b52;
        }
        .status-dot.armed { background: #34c759; }
        .status-dot.measuring { background: #007aff; }
        .status-dot.completed { background: #34c759; }

        /* Sensor liveness dots (tee / hog_far) */
        .sensor-dots {
            margin-left: auto;
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .sensor-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #1c1c1f; /* unknown */
            box-shadow: inset 0 0 0 2px rgba(255,255,255,0.12);
        }
        .sensor-dot.online { background: #34c759; }
        .sensor-dot.offline { background: #ff3b30; }
        .sensor-dot.local { background: #86868b; }

        /* Main row */
        .main-row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            flex-shrink: 0;
            transition: flex 0.3s ease;
        }

        .main-row.expanded {
            flex: 1;
        }

        .time-cards {
            flex: 1;
            display: flex;
            gap: 10px;
        }

        .time-card {
            flex: 1;
            padding: 24px 16px;
            border-radius: 14px;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            min-height: 120px;
        }

        .time-card.tee-hog {
            background: linear-gradient(135deg, #ff5fa2 0%, #ff8ac4 100%);
        }

        .time-card.hog-hog {
            background: linear-gradient(135deg, #ff9f2e 0%, #ffc266 100%);
        }

        .time-label {
            font-size: 1rem;
            font-weight: 500;
            opacity: 0.85;
            margin-bottom: 4px;
        }

        .time-value {
            font-size: 5.5rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            transition: font-size 0.3s ease;
        }

        .time-value.waiting { opacity: 0.4; }

        .main-row.expanded .time-value {
            font-size: 7rem;
        }

        .main-row.expanded .time-label {
            font-size: 1.3rem;
        }

        .main-row.expanded .time-card {
            min-height: 160px;
        }

        /* Mobile layout tweaks */
        @media (max-width: 600px) {
            body {
                padding: 8px;
            }

            header {
                margin-bottom: 8px;
            }

            .main-row {
                flex-direction: column;
                align-items: stretch;
            }

            .time-cards {
                width: 100%;
            }

            .time-card {
                padding: 16px 10px;
                min-height: 96px;
            }

            .time-label {
                font-size: 0.9rem;
            }

            .time-value {
                font-size: 3.6rem;
            }

            .main-row.expanded .time-value {
                font-size: 4.4rem;
            }

            .main-row.expanded .time-label {
                font-size: 1.05rem;
            }

            .main-row.expanded .time-card {
                min-height: 120px;
            }

            .btn-rearm {
                width: 100% !important;
                min-width: 100% !important;
                margin-top: 8px;
                padding: 10px 12px;
                flex-direction: row;
                gap: 8px;
                font-size: 0.75rem;
                align-self: stretch;
            }

            .btn-rearm svg {
                width: 20px;
                height: 20px;
            }

            .time-card.tee-hog { background: linear-gradient(135deg, #ff5fa2 0%, #ff8ac4 100%); }
            .time-card.hog-hog { background: linear-gradient(135deg, #ff9f2e 0%, #ffc266 100%); }
        }

        /* Rearm button */
        .btn-rearm {
            width: 80px;
            min-width: 80px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, #22c1c3 0%, #2ecc71 100%);
            color: white;
            font-family: inherit;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            transition: transform 0.1s, opacity 0.1s;
        }

        .btn-rearm:active { transform: scale(0.96); }
        .btn-rearm:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-rearm svg { width: 24px; height: 24px; }

        /* Resizable divider */
        .divider {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 0;
            flex-shrink: 0;
            cursor: ns-resize;
            user-select: none;
            touch-action: none;
        }

        .divider-line {
            flex: 1;
            height: 2px;
            background: #1c1c1f;
            border-radius: 1px;
        }

        .divider-handle {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            background: #121215;
            border-radius: 12px;
            font-size: 0.8rem;
            color: #cfcfd6;
            font-weight: 500;
        }

        .divider-handle svg {
            width: 16px;
            height: 16px;
        }

        .btn-toggle {
            background: #121215;
            border: none;
            padding: 6px 10px;
            border-radius: 8px;
            cursor: pointer;
            color: #cfcfd6;
            display: flex;
            align-items: center;
            font-family: inherit;
            font-size: 0.75rem;
            font-weight: 600;
            gap: 4px;
            transition: color 0.2s;
        }

        .btn-toggle:hover { color: #f2f2f2; }
        .btn-toggle:active { transform: scale(0.95); }
        .btn-toggle svg { width: 14px; height: 14px; }

        .btn-clear {
            padding: 4px 10px;
            border: none;
            border-radius: 8px;
            background: #ff3b30;
            color: white;
            font-family: inherit;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .btn-clear:active { transform: scale(0.95); }
        .btn-clear svg { width: 12px; height: 12px; }

        @media (max-width: 600px) {
            #btn-toggle { display: none; }
        }

        /* History section */
        .history-section {
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: flex 0.3s ease;
        }

        .history-section.collapsed {
            flex: 0 0 0;
            min-height: 0;
            overflow: hidden;
            display: none;
        }

        .history-wrapper {
            flex: 1;
            overflow-y: auto;
            min-height: 0;
        }

        .history-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 1.15rem;
        }

        .history-table th {
            text-align: left;
            padding: 8px 6px;
            font-weight: 600;
            color: #cfcfd6;
            border-bottom: 2px solid #1c1c1f;
            font-size: 0.95rem;
            position: sticky;
            top: 0;
            background: #000000;
        }

        .history-table td {
            padding: 10px 6px;
            border-bottom: 1px solid #121215;
        }

        .history-table tr:last-child td { border-bottom: none; }

        .history-table .time-col {
            color: #cfcfd6;
            font-size: 1rem;
        }

        .history-table .tee-hog-col {
            color: #ff7ab8;
            font-weight: 700;
            font-size: 1.2rem;
            font-family: 'SF Mono', 'Menlo', monospace;
        }

        .history-table .hog-hog-col {
            color: #ffb347;
            font-weight: 700;
            font-size: 1.2rem;
            font-family: 'SF Mono', 'Menlo', monospace;
        }

        .empty-history {
            text-align: center;
            padding: 20px;
            color: #cfcfd6;
            font-size: 1rem;
        }

        /* Settings button */
        .btn-settings {
            background: none;
            border: none;
            padding: 4px;
            cursor: pointer;
            color: #cfcfd6;
            display: flex;
            align-items: center;
            margin-left: 8px;
        }
        .btn-settings:hover { color: #f2f2f2; }
        .btn-settings svg { width: 20px; height: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <span class="logo-icon" aria-hidden="true"></span>
                <span class="logo-text">Rock Timer</span>
            </div>
            <div class="sensor-dots" title="Sensor status">
                <div class="sensor-dot online" title="Tee"></div>
                <div class="sensor-dot offline" title="Hog far"></div>
            </div>
            <div class="status-dot completed" id="status-dot" title="Status"></div>
            <button class="btn-settings" title="Settings (mockup)">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="3"></circle>
                    <path d="M12 1v2m0 18v2M4.22 4.22l1.42 1.42m12.72 12.72l1.42 1.42M1 12h2m18 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"></path>
                </svg>
            </button>
        </header>

        <div class="main-row">
            <div class="time-cards">
                <div class="time-card tee-hog">
                    <div class="time-label">Tee-Hog</div>
                    <div class="time-value" id="value-tee-hog">3.12</div>
                </div>
                <div class="time-card hog-hog">
                    <div class="time-label">Hog-Hog</div>
                    <div class="time-value" id="value-hog-hog">10.84</div>
                </div>
            </div>
            <button class="btn-rearm" id="btn-rearm" onclick="rearm()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M1 4v6h6"></path>
                    <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path>
                </svg>
                Rearm
            </button>
        </div>

        <div class="divider">
            <div class="divider-line"></div>
            <button class="btn-toggle" id="btn-toggle" onclick="toggleHistory()" title="Show/Hide history (mockup)">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="18 15 12 9 6 15"></polyline>
                </svg>
                <span id="toggle-text">Hide</span>
            </button>
            <div class="divider-handle">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="5" y1="9" x2="19" y2="9"></line>
                    <line x1="5" y1="15" x2="19" y2="15"></line>
                </svg>
                History
            </div>
            <button class="btn-clear" id="btn-clear" onclick="clearHistory()" title="Clear (mockup)">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 6h18"></path>
                    <path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path>
                </svg>
                Clear
            </button>
            <div class="divider-line"></div>
        </div>

        <div class="history-section" id="history-section">
            <div class="history-wrapper">
                <table class="history-table">
                    <thead>
                        <tr>
                            <th>Time</th>
                            <th>Tee-Hog</th>
                            <th>Hog-Hog</th>
                        </tr>
                    </thead>
                    <tbody id="history-body">
                        <tr>
                            <td class="time-col">19:42:08</td>
                            <td class="tee-hog-col">3.06</td>
                            <td class="hog-hog-col">10.92</td>
                        </tr>
                        <tr>
                            <td class="time-col">19:39:51</td>
                            <td class="tee-hog-col">3.14</td>
                            <td class="hog-hog-col">10.71</td>
                        </tr>
                        <tr>
                            <td class="time-col">19:35:22</td>
                            <td class="tee-hog-col">3.09</td>
                            <td class="hog-hog-col">10.88</td>
                        </tr>
                        <tr>
                            <td class="time-col">19:31:07</td>
                            <td class="tee-hog-col">3.22</td>
                            <td class="hog-hog-col">11.03</td>
                        </tr>
                        <tr>
                            <td class="time-col">19:28:45</td>
                            <td class="tee-hog-col">3.12</td>
                            <td class="hog-hog-col">10.84</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <script>
        var demoTimes = [
            { tee: '3.06', hog: '10.92' },
            { tee: '3.14', hog: '10.71' },
            { tee: '3.09', hog: '10.88' },
            { tee: '3.22', hog: '11.03' },
            { tee: '3.12', hog: '10.84' }
        ];
        var demoIndex = 0;
        var historyVisible = true;

        function setStatus(state) {
            document.getElementById('status-dot').className = 'status-dot ' + state;
        }

        function nextTimes() {
            demoIndex = (demoIndex + 1) % demoTimes.length;
            document.getElementById('value-tee-hog').textContent = demoTimes[demoIndex].tee;
            document.getElementById('value-hog-hog').textContent = demoTimes[demoIndex].hog;
        }

        function rearm() {
            var th = document.getElementById('value-tee-hog');
            var hh = document.getElementById('value-hog-hog');
            setStatus('armed');
            th.textContent = '--';
            hh.textContent = '--';
            th.classList.add('waiting');
            hh.classList.add('waiting');
            setTimeout(function() {
                setStatus('measuring');
                setTimeout(function() {
                    setStatus('completed');
                    th.classList.remove('waiting');
                    hh.classList.remove('waiting');
                    nextTimes();
                }, 600);
            }, 400);
        }

        function toggleHistory() {
            historyVisible = !historyVisible;
            var section = document.getElementById('history-section');
            var mainRow = document.querySelector('.main-row');
            var timeValues = document.querySelectorAll('.time-value');
            var timeLabels = document.querySelectorAll('.time-label');
            var timeCards = document.querySelectorAll('.time-card');
            var text = document.getElementById('toggle-text');
            var isMobile = window.innerWidth <= 600;
            if (historyVisible) {
                section.style.display = '';
                mainRow.style.flex = '';
                mainRow.style.flex = '';
                mainRow.style.flexDirection = '';
                timeValues.forEach(function(el) { el.style.fontSize = ''; });
                timeLabels.forEach(function(el) { el.style.fontSize = ''; });
                timeCards.forEach(function(el) { el.style.minHeight = ''; el.style.flex = ''; el.style.padding = ''; });
                text.textContent = 'Hide';
            } else {
                section.style.display = 'none';
                mainRow.style.flex = '1';
                if (isMobile) {
                    timeValues.forEach(function(el) { el.style.fontSize = '4.2rem'; });
                } else {
                    mainRow.style.flex = '1';
                    timeValues.forEach(function(el) { el.style.fontSize = '7rem'; });
                    timeLabels.forEach(function(el) { el.style.fontSize = '1.3rem'; });
                    timeCards.forEach(function(el) { el.style.minHeight = '160px'; });
                }
                text.textContent = 'Show';
            }
        }

        function clearHistory() {
            document.getElementById('history-body').innerHTML = '<tr><td colspan="3" class="empty-history">No measurements yet</td></tr>';
        }
    </script>
</body>
</html>
